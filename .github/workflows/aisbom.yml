name: AIsbom Security Scan
# E2E sandbox — fire on every PR so we always exercise the Action.
# In a real consumer repo you'd add `paths: ['models/**']` to scope this.
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  aisbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Lab700xOrg/aisbom@v1
        with:
          directory: models/
